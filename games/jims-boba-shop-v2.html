/* ---------- Input ---------- */
const Input = (() => {
  const keymap = {
    'arrowleft':'left','a':'left','arrowright':'right','d':'right',
    'arrowup':'up','w':'up','arrowdown':'down','s':'down',
    ' ':'action','enter':'action','escape':'cancel'
  };
  const held = new Set(), pressed = new Set();
  const pointer = { x: -999, y: -999, isDown: false, clicked: false };
  let canvas = null;

  window.addEventListener('keydown', e => {
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    const k = e.key.toLowerCase();
    if (keymap[k] && !held.has(keymap[k])) pressed.add(keymap[k]);
    if (keymap[k]) held.add(keymap[k]);
  });
  window.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (keymap[k]) held.delete(keymap[k]);
  });

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width / r.width, sy = canvas.height / r.height;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx - r.left) * sx, y: (cy - r.top) * sy };
  }

  function attachPointer(c) {
    canvas = c;
    const down = e => {
      const p = getPos(e);
      pointer.x = p.x; pointer.y = p.y;
      pointer.isDown = true; pointer.clicked = true;
      e.preventDefault();
    };
    const move = e => {
      const p = getPos(e);
      pointer.x = p.x; pointer.y = p.y;
      e.preventDefault();
    };
    const up = () => { pointer.isDown = false; };
    c.addEventListener('mousedown', down);
    c.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    c.addEventListener('touchstart', down, { passive: false });
    c.addEventListener('touchmove', move, { passive: false });
    c.addEventListener('touchend', up);
  }

  return {
    isDown: a => held.has(a),
    wasPressed: a => pressed.has(a),
    enableTouchControls: () => {},
    pointer,
    attachPointer,
    endFrame: () => { pressed.clear(); pointer.clicked = false; }
  };
})();

/* ---------- Juice ---------- */
const Juice = (() => {
  let shakeAmt = 0, freezeFrames = 0;
  return {
    lerp: (a, b, t) => a + (b - a) * t,
    shake: n => { shakeAmt = Math.max(shakeAmt, n); },
    getShake: () => {
      const x = (Math.random() - 0.5) * shakeAmt;
      const y = (Math.random() - 0.5) * shakeAmt;
      shakeAmt *= 0.85;
      if (shakeAmt < 0.1) shakeAmt = 0;
      return { x, y };
    },
    burst: (x, y, count, color) => {
      const out = [];
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 1 + Math.random() * 3;
        out.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s - 1,
          life: 1, color,
          size: 2 + Math.random() * 3
        });
      }
      return out;
    },
    updateParticles(arr, dt) {
      for (let i = arr.length - 1; i >= 0; i--) {
        const p = arr[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.15; p.vx *= 0.96;
        p.life -= dt * 1.5;
        if (p.life <= 0) arr.splice(i, 1);
      }
    },
    drawParticles(ctx, arr) {
      for (const p of arr) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    },
    freeze: n => { freezeFrames = n; },
    isFrozen: () => freezeFrames > 0,
    tickFreeze: () => { if (freezeFrames > 0) freezeFrames--; }
  };
})();

/* ---------- Sound ---------- */
const Sound = (() => {
  let ctx = null, master = null, cozyGain = null, tensionGain = null;
  let cozyStarted = false;

  function ensure() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value = 0.7; master.connect(ctx.destination);
    cozyGain = ctx.createGain(); cozyGain.gain.value = 0; cozyGain.connect(master);
    tensionGain = ctx.createGain(); tensionGain.gain.value = 0; tensionGain.connect(master);
  }

  function startCozy() {
    if (cozyStarted) return;
    ensure();
    cozyStarted = true;
    // Slower, more melancholy pad — minor key for the weathered/overcast vibe
    const notes = [196, 233.08, 293.66, 392]; // G Bb D G — minor-ish
    notes.forEach((freq, i) => {
      const o = ctx.createOscillator();
      o.type = 'sine'; o.frequency.value = freq;
      const g = ctx.createGain();
      g.gain.value = 0.055 + i * 0.008;
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.07 + i * 0.04;
      const lfoG = ctx.createGain(); lfoG.gain.value = 0.022;
      lfo.connect(lfoG).connect(g.gain);
      o.connect(g).connect(cozyGain);
      o.start(); lfo.start();
    });
    const now = ctx.currentTime;
    cozyGain.gain.setValueAtTime(0, now);
    cozyGain.gain.linearRampToValueAtTime(0.5, now + 2.4);
  }

  function duckCozy(target, secs) {
    if (!ctx) return;
    const now = ctx.currentTime;
    cozyGain.gain.cancelScheduledValues(now);
    cozyGain.gain.setValueAtTime(cozyGain.gain.value, now);
    cozyGain.gain.linearRampToValueAtTime(target, now + secs);
  }

  function tensionPulse(rampSec, holdSec) {
    ensure();
    const now = ctx.currentTime;
    const o = ctx.createOscillator();
    o.type = 'sawtooth'; o.frequency.value = 48;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 100;
    o.connect(filt).connect(tensionGain);
    o.start(now);
    tensionGain.gain.cancelScheduledValues(now);
    tensionGain.gain.setValueAtTime(0, now);
    tensionGain.gain.linearRampToValueAtTime(0.42, now + rampSec);
    tensionGain.gain.linearRampToValueAtTime(0, now + rampSec + holdSec + 0.7);
    o.stop(now + rampSec + holdSec + 0.8);
  }

  function play(name) {
    ensure();
    const now = ctx.currentTime;
    if (name === 'coin') {
      [880, 1320].forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'triangle'; o.frequency.value = f;
        g.gain.setValueAtTime(0.16, now + i * 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.25);
        o.connect(g).connect(master);
        o.start(now + i * 0.06); o.stop(now + i * 0.06 + 0.3);
      });
    } else if (name === 'place') {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(190, now);
      o.frequency.exponentialRampToValueAtTime(95, now + 0.14);
      g.gain.setValueAtTime(0.3, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      o.connect(g).connect(master);
      o.start(now); o.stop(now + 0.25);
    } else if (name === 'click') {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 720;
      g.gain.setValueAtTime(0.1, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
      o.connect(g).connect(master);
      o.start(now); o.stop(now + 0.1);
    } else if (name === 'reject') {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square'; o.frequency.value = 130;
      g.gain.setValueAtTime(0.1, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.connect(g).connect(master);
      o.start(now); o.stop(now + 0.2);
    } else if (name === 'iceclink') {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 4);
      }
      const noise = ctx.createBufferSource(); noise.buffer = buf;
      const filt = ctx.createBiquadFilter();
      filt.type = 'highpass'; filt.frequency.value = 4500;
      const g = ctx.createGain(); g.gain.value = 0.06;
      noise.connect(filt).connect(g).connect(master);
      noise.start();
    } else if (name === 'shaker') {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        const env = Math.sin((i / d.length) * Math.PI);
        d[i] = (Math.random() * 2 - 1) * env * 0.5;
      }
      const noise = ctx.createBufferSource(); noise.buffer = buf;
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass'; filt.frequency.value = 2200;
      const g = ctx.createGain(); g.gain.value = 0.045;
      noise.connect(filt).connect(g).connect(master);
      noise.start();
    } else if (name === 'footstep') {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        const env = Math.pow(1 - i / d.length, 2);
        d[i] = (Math.random() * 2 - 1) * env * 0.6;
      }
      const noise = ctx.createBufferSource(); noise.buffer = buf;
      const filt = ctx.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 300;
      const g = ctx.createGain(); g.gain.value = 0.04;
      noise.connect(filt).connect(g).connect(master);
      noise.start();
    } else if (name === 'scarehit') {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        const env = Math.pow(1 - i / d.length, 1.5);
        d[i] = (Math.random() * 2 - 1) * env;
      }
      const noise = ctx.createBufferSource(); noise.buffer = buf;
      const filt = ctx.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 800;
      const g = ctx.createGain(); g.gain.value = 0.45;
      noise.connect(filt).connect(g).connect(master);
      noise.start();
    }
  }

  return { ensure, play, startCozy, duckCozy, tensionPulse };
})();

/* ---------- Canvas ---------- */
const Canvas = (() => {
  function fit(canvas, baseW, baseH) {
    function resize() {
      const margin = 16;
      const aw = window.innerWidth - margin * 2;
      const ah = window.innerHeight - margin * 2;
      const ratio = baseW / baseH;
      let w = aw, h = aw / ratio;
      if (h > ah) { h = ah; w = ah * ratio; }
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
    }
    resize();
    window.addEventListener('resize', resize);
  }
  return { fit };
})();

/* ----- Game state ----- */
let t = 0;
let coins = 30;
let mode = 'build';   // 'build' | 'play'
let selected = null;
const placed = [];
let particles = [];
let needsTap = true;
let audioStarted = false;
let coinFlash = 0;
let playerName = '';
let profileOpen = false;
let modeFade = 1;     // 1 = fully visible, drops on mode switch

/* ----- Player character ----- */
const player = {
  x: 200, y: 0,        // y is the feet position; will be set to sidewalk floor
  vx: 0,
  facing: 1,           // 1 = right, -1 = left
  walkPhase: 0,
  isWalking: false,
  footstepTimer: 0,
};

/* ----- Jim scheduler ----- */
let jimNextAt = 14;    // first sighting at 14s
let jimActive = false;
let jimDuration = 0;
let tensionStarted = false;

/* ----- Cozy event triggers ----- */
let nextIce = 4;
let nextShaker = 7;

/* ----- Items + placement bounds ----- */
const ITEMS = {
  counter: { cost: 5,  color: PAL.tee,    name: 'Counter',      w: 70, h: 14 },
  machine: { cost: 10, color: PAL.matcha, name: 'Boba Machine', w: 24, h: 38 },
  table:   { cost: 3,  color: PAL.powder, name: 'Table',        w: 24, h: 18 }
};
/* The visible shop interior — through the storefront window */
const SHOP = { x: 178, y: 215, w: 380, h: 158 };
/* Player walks on this y; sidewalk extends from this minus a bit */
const SIDEWALK_Y = 432;
const SIDEWALK_LEFT = 30, SIDEWALK_RIGHT = 770;

/* ----- Atmosphere ----- */
const motes = [];
for (let i = 0; i < 36; i++) {
  motes.push({
    x: Math.random() * W,
    y: 60 + Math.random() * 380,
    vx: (Math.random() - 0.5) * 0.18,
    vy: -0.06 - Math.random() * 0.15,
    size: 1 + Math.random() * 1.6,
    phase: Math.random() * Math.PI * 2
  });
}
const fog = [];
for (let i = 0; i < 5; i++) {
  fog.push({
    x: Math.random() * W,
    y: 410 + Math.random() * 50,
    speed: 0.14 + Math.random() * 0.22,
    width: 200 + Math.random() * 180,
    alpha: 0.04 + Math.random() * 0.06
  });
}

/* ----- Brick neighbor stacks (precomputed for perf) ----- */
const brickRows = [];
for (let row = 0; row < 30; row++) {
  brickRows.push({
    y: 80 + row * 11,
    offset: (row % 2) * 18
  });
}

/* ----- Audio kicks in on first interaction ----- */
function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  Sound.ensure();
  Sound.startCozy();
}
window.addEventListener('pointerdown', startAudio, { once: true });
window.addEventListener('keydown', startAudio, { once: true });

/* ============ Profile Panel ============ */
const profilePanel = document.getElementById('profilePanel');
const portraitCanvas = document.getElementById('portrait');
const portraitCtx = portraitCanvas.getContext('2d');
const nameInput = document.getElementById('nameInput');
const closeProfile = document.getElementById('closeProfile');

function openProfile() {
  if (needsTap) return;
  profileOpen = true;
  drawPortrait();
  profilePanel.style.display = 'flex';
  nameInput.value = playerName;
  setTimeout(() => nameInput.focus(), 80);
  Sound.play('click');
}
function closeProfilePanel() {
  playerName = nameInput.value.trim();
  profilePanel.style.display = 'none';
  profileOpen = false;
  Sound.play('click');
}
closeProfile.addEventListener('click', closeProfilePanel);
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') closeProfilePanel();
});
nameInput.addEventListener('input', () => { drawPortrait(); });

/* ============ Mouse / touch dispatch ============ */
function handleInput() {
  if (needsTap) {
    if (Input.pointer.clicked) { needsTap = false; Sound.play('click'); }
    return;
  }
  if (profileOpen) return;

  /* Continuous keyboard movement (play mode) */
  if (mode === 'play') {
    let target = 0;
    if (Input.isDown('left'))  target -= 2.5;
    if (Input.isDown('right')) target += 2.5;
    player.vx = Juice.lerp(player.vx, target, 0.22);
  } else {
    player.vx = 0;
  }

  if (Input.pointer.clicked) {
    const px = Input.pointer.x, py = Input.pointer.y;

    /* Profile button — top-left */
    if (px >= 12 && px <= 60 && py >= 12 && py <= 60) {
      openProfile(); return;
    }

    /* Mode toggle — top-center */
    const tx = W/2 - 60, ty = 12, tw = 120, th = 32;
    if (px >= tx && px <= tx + tw && py >= ty && py <= ty + th) {
      mode = (mode === 'build') ? 'play' : 'build';
      modeFade = 0;
      selected = null;
      Sound.play('click');
      return;
    }

    if (mode === 'build') {
      /* Build palette */
      const items = Object.keys(ITEMS);
      const slotW = 130;
      const startX = W/2 - (items.length * slotW) / 2;
      let inPalette = false;
      items.forEach((key, i) => {
        const x = startX + i * slotW, y = H - 56, w = slotW - 10, h = 44;
        if (px >= x && px <= x + w && py >= y && py <= y + h) {
          selected = (selected === key) ? null : key;
          Sound.play('click');
          inPalette = true;
        }
      });
      /* Place inside the shop window */
      if (!inPalette && selected) {
        if (px >= SHOP.x && px <= SHOP.x + SHOP.w &&
            py >= SHOP.y && py <= SHOP.y + SHOP.h) {
          const it = ITEMS[selected];
          if (coins >= it.cost) {
            const cx = Math.max(SHOP.x + it.w/2, Math.min(SHOP.x + SHOP.w - it.w/2, px));
            const cy = Math.max(SHOP.y + it.h/2, Math.min(SHOP.y + SHOP.h - it.h/2, py));
            coins -= it.cost; coinFlash = 1;
            placed.push({ type: selected, x: cx, y: cy });
            particles.push(...Juice.burst(cx, cy, 14, it.color));
            Sound.play('place'); Sound.play('coin');
            Juice.shake(2.5);
          } else {
            Sound.play('reject');
          }
        }
      }
    }
  }
}

/* ============ Update ============ */
function update(dt) {
  handleInput();
  if (needsTap || profileOpen) { Input.endFrame(); return; }

  t += dt;
  coinFlash = Math.max(0, coinFlash - dt * 2);
  if (modeFade < 1) modeFade = Math.min(1, modeFade + dt * 2.5);

  /* Player walking */
  if (mode === 'play') {
    player.x += player.vx;
    if (player.x < SIDEWALK_LEFT) { player.x = SIDEWALK_LEFT; player.vx = 0; }
    if (player.x > SIDEWALK_RIGHT) { player.x = SIDEWALK_RIGHT; player.vx = 0; }
    if (Math.abs(player.vx) > 0.4) {
      player.facing = player.vx > 0 ? 1 : -1;
      player.isWalking = true;
      player.walkPhase += dt * 9 * (Math.abs(player.vx) / 2.5);
      player.footstepTimer += dt;
      if (player.footstepTimer > 0.34 / Math.max(0.5, Math.abs(player.vx) / 2.5)) {
        player.footstepTimer = 0;
        if (audioStarted) Sound.play('footstep');
      }
    } else {
      player.isWalking = false;
    }
  } else {
    /* Build mode — player idles at right side, watching */
    player.x = Juice.lerp(player.x, 720, 0.05);
    player.facing = -1;
    player.isWalking = false;
    player.vx = 0;
  }

  /* Atmosphere */
  for (const m of motes) {
    m.x += m.vx; m.y += m.vy; m.phase += dt * 2;
    if (m.y < 50 || m.x < -10 || m.x > W + 10) {
      m.x = Math.random() * W; m.y = H * 0.85 + Math.random() * 10;
    }
  }
  for (const f of fog) {
    f.x += f.speed;
    if (f.x > W + f.width) f.x = -f.width;
  }

  /* Cozy event layer */
  if (audioStarted && !jimActive) {
    nextIce -= dt;
    if (nextIce <= 0) { Sound.play('iceclink'); nextIce = 2.5 + Math.random() * 4; }
    nextShaker -= dt;
    if (nextShaker <= 0) { Sound.play('shaker'); nextShaker = 5 + Math.random() * 5; }
  }

  /* Jim */
  if (!jimActive) {
    jimNextAt -= dt;
    if (jimNextAt < 1.6 && !tensionStarted && audioStarted) {
      tensionStarted = true;
      Sound.duckCozy(0.16, 1.4);
      Sound.tensionPulse(1.4, 0.5);
    }
    if (jimNextAt <= 0) {
      jimActive = true;
      jimDuration = 0.55 + Math.random() * 0.25;
      Juice.shake(4);
      if (audioStarted) Sound.play('scarehit');
    }
  } else {
    jimDuration -= dt;
    if (jimDuration <= 0) {
      jimActive = false;
      tensionStarted = false;
      jimNextAt = 22 + Math.random() * 16;
      if (audioStarted) Sound.duckCozy(0.5, 2.5);
    }
  }

  Juice.updateParticles(particles, dt);
  Input.endFrame();
}

function drawSky() {

function drawDistantBuildings() {

function drawBrickWall(x, w, top, bottom) {
  /* Brick base */
  ctx.fillStyle = PAL.brickDk;
  ctx.fillRect(x, top, w, bottom - top);

  /* Mortar pattern */
  ctx.fillStyle = PAL.mortar;
  for (let row = 0; row * 11 + top < bottom; row++) {
    const ry = top + row * 11;
    /* Mortar between bricks (horizontal) */
    ctx.fillRect(x, ry, w, 1.5);
    /* Vertical mortar (every brick) */
    const offset = (row % 2) * 18;
    for (let bx = x - offset; bx < x + w; bx += 36) {
      ctx.fillRect(bx, ry, 1.5, 11);
    }
  }

  /* Brick faces — varied colors */
  for (let row = 0; row * 11 + top < bottom; row++) {
    const ry = top + row * 11 + 1.5;
    const offset = (row % 2) * 18;
    for (let bx = x - offset; bx < x + w; bx += 36) {
      /* Pseudo-random brick color via position-based hash */
      const seed = (Math.sin((bx + ry * 13) * 0.41) + 1) * 0.5;
      const tint = seed < 0.3 ? PAL.brickDk : seed < 0.7 ? PAL.brick : PAL.brickHi;
      ctx.fillStyle = tint;
      ctx.fillRect(Math.max(x, bx + 1.5), ry, 34.5, 9);
    }
  }
}

function drawJim(cx, cy) {
  /* Tall, thin, scary MAN. No horns. Pale, smile-too-wide, eyes-don't-blink. */
  ctx.save();

  /* Body — narrow shoulders */
  ctx.fillStyle = PAL.jimDark;
  /* Tee shirt body */
  ctx.fillRect(cx - 14, cy + 4, 28, 22);
  /* Skinny neck */
  ctx.fillRect(cx - 3, cy - 3, 6, 8);

  /* Boba tee — slightly lighter front panel */
  ctx.fillStyle = '#1a1014';
  ctx.fillRect(cx - 12, cy + 6, 24, 18);
  /* "BOBA" text */
  ctx.fillStyle = '#3a2026';
  ctx.font = "bold 7px sans-serif";
  ctx.textAlign = 'center';
  ctx.fillText('BOBA', cx, cy + 18);

  /* Head — pale, slightly elongated */
  ctx.fillStyle = PAL.jimSkin;
  ctx.beginPath();
  ctx.ellipse(cx, cy - 14, 11, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  /* Side shadow on head — adds dimension */
  ctx.fillStyle = PAL.jimSkinDk;
  ctx.beginPath();
  ctx.ellipse(cx + 4, cy - 14, 7, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  /* Hair — flat dark strip on top */
  ctx.fillStyle = PAL.jimDark;
  ctx.beginPath();
  ctx.ellipse(cx, cy - 23, 11, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(cx - 11, cy - 23, 4, 8);   /* sideburn */
  ctx.fillRect(cx + 7, cy - 23, 4, 8);

  /* Eyes — black hollow, locked forward, not blinking */
  ctx.fillStyle = PAL.jimDark;
  ctx.fillRect(cx - 7, cy - 15, 4, 3);
  ctx.fillRect(cx + 3, cy - 15, 4, 3);
  /* Tiny pinpoint pupils */
  ctx.fillStyle = '#5a0008';
  ctx.fillRect(cx - 5, cy - 14, 1.2, 1.2);
  ctx.fillRect(cx + 5, cy - 14, 1.2, 1.2);

  /* The smile — too wide. Stretches almost ear to ear */
  ctx.strokeStyle = PAL.jimSmile;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 9, cy - 8);
  ctx.quadraticCurveTo(cx, cy - 4, cx + 9, cy - 8);
  ctx.stroke();
  /* Tiny tooth gaps */
  ctx.strokeStyle = '#1a0508';
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  for (let i = -7; i <= 7; i += 2) {
    ctx.moveTo(cx + i, cy - 7.5);
    ctx.lineTo(cx + i, cy - 6);
  }
  ctx.stroke();

  ctx.restore();
}

function drawSidewalk() {

function drawPlacedItems() {
  /* Items inside the shop, viewed through the window */
  const sorted = [...placed].sort((a, b) => a.y - b.y);
  for (const p of sorted) {
    const it = ITEMS[p.type];
    /* Slightly darker tint because they're behind glass + dim interior */
    const dim = 0.85;
    if (p.type === 'counter') {
      ctx.fillStyle = '#5e3c25';
      ctx.fillRect(p.x - it.w/2, p.y - it.h/2, it.w, it.h);
      ctx.fillStyle = '#3a2418';
      ctx.fillRect(p.x - it.w/2, p.y + it.h/2 - 3, it.w, 3);
      ctx.fillStyle = '#7a5435';
      ctx.fillRect(p.x - it.w/2 + 3, p.y - it.h/2 + 1, it.w - 6, 2);
    } else if (p.type === 'machine') {
      ctx.fillStyle = '#7a9670';
      ctx.fillRect(p.x - it.w/2, p.y - it.h/2, it.w, it.h);
      ctx.fillStyle = '#4a6240';
      ctx.fillRect(p.x - it.w/2, p.y + it.h/2 - 5, it.w, 5);
      ctx.fillStyle = '#c8c0a8';
      ctx.fillRect(p.x - it.w/2 + 4, p.y - it.h/2 + 5, it.w - 8, 14);
      const bob = Math.sin(t * 2.4 + p.x * 0.1) * 1;
      ctx.fillStyle = '#5a7858';
      ctx.fillRect(p.x - it.w/2 + 4, p.y - it.h/2 + 12 + bob, it.w - 8, 7 - bob);
      ctx.fillStyle = PAL.bobaRed;
      ctx.beginPath();
      ctx.arc(p.x - 6, p.y + 10, 1.2, 0, Math.PI * 2);

      ctx.fill();
    } else if (p.type === 'table') {
      ctx.fillStyle = '#7fa0b0';
      ctx.fillRect(p.x - 2, p.y - 3, 4, it.h/2);
      ctx.fillStyle = '#9ab8c8';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y - 4, it.w/2, it.h/4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      ctx.ellipse(p.x - 3, p.y - 6, it.w/3, it.h/8, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

/* === Side-view player character === */
function drawPlayer() {
  if (mode === 'build' && Math.abs(player.x - 720) < 1) {
    /* Make sure she's drawn even when idle in build mode */
  }

  ctx.save();
  ctx.translate(player.x, SIDEWALK_Y);
  ctx.scale(player.facing, 1);

  const phase = player.walkPhase;
  const walking = player.isWalking;
  const legAmp = walking ? 4 : 0;
  const armAmp = walking ? 4 : 0;
  const bob = walking ? Math.abs(Math.sin(phase * 2)) * 1.4 : Math.sin(t * 1.8) * 0.4;
  const breath = Math.sin(t * 1.5) * 0.4;

  /* Soft shadow on ground */
  ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
  ctx.beginPath();
  ctx.ellipse(0, 1, 14, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  const legA = Math.sin(phase) * legAmp;
  const legB = -Math.sin(phase) * legAmp;

  /* === Back leg (further) === */
  ctx.fillStyle = PAL.skinDk;  /* slightly shaded */
  ctx.fillRect(-2 + legB, -16, 4, 12);
  ctx.fillStyle = '#c8c0b4';
  ctx.fillRect(-3 + legB, -4, 6, 4);  /* sneaker */
  ctx.fillStyle = '#3a3530';
  ctx.fillRect(-3 + legB, -1, 6, 1);  /* sole */

  /* === Front leg === */
  ctx.fillStyle = PAL.skin;
  ctx.fillRect(-2 + legA, -16, 4, 12);
  ctx.fillStyle = PAL.sneaker;
  ctx.fillRect(-3 + legA, -4, 6, 4);
  ctx.fillStyle = '#3a3530';
  ctx.fillRect(-3 + legA, -1, 6, 1);
  /* sneaker stripe */
  ctx.fillStyle = PAL.bobaRed;
  ctx.fillRect(-3 + legA, -3, 6, 1);

  /* === Jean shorts === */
  ctx.fillStyle = PAL.jean;
  ctx.fillRect(-7, -25, 14, 11);
  ctx.fillStyle = PAL.jeanHi;
  ctx.fillRect(-7, -25, 14, 1.5);  /* belt highlight */
  /* Pocket detail */
  ctx.fillStyle = PAL.jean;
  ctx.fillRect(-6, -22, 4, 6);
  ctx.strokeStyle = '#5a6a8a';
  ctx.lineWidth = 0.4;
  ctx.strokeRect(-6, -22, 4, 6);

  /* === Tee shirt body === */
  ctx.fillStyle = PAL.tee;
  ctx.fillRect(-8, -45 - bob, 16, 21 + bob);
  /* Shading down the side */
  ctx.fillStyle = PAL.teeDk;
  ctx.fillRect(-8, -45 - bob, 3, 21 + bob);
  /* Sleeve cap */
  ctx.fillStyle = PAL.tee;
  ctx.fillRect(2, -45 - bob, 5, 7);

  /* === Apron — pink, the brightest thing in the scene === */
  ctx.fillStyle = PAL.apron;
  ctx.fillRect(-6, -38 - bob, 12, 18 + bob);
  /* Apron strap up to neck */
  ctx.fillRect(-2, -49 - bob, 4, 11 + bob);
  /* Apron tie at hip */
  ctx.fillStyle = PAL.apronDk;
  ctx.fillRect(-7, -22, 14, 1.5);
  /* Apron top hem highlight */
  ctx.fillStyle = PAL.apronHi;
  ctx.fillRect(-6, -38 - bob, 12, 1.5);
  /* Apron pocket */
  ctx.fillStyle = PAL.apronDk;
  ctx.fillRect(-3, -28 - bob/2, 6, 5);

  /* === Arm (the close one, swings) === */
  const armX = -1 + Math.sin(phase + Math.PI) * armAmp * 0.6;
  /* Upper arm (apron strap covers shoulder) */
  ctx.fillStyle = PAL.tee;
  ctx.fillRect(armX, -42 - bob, 4, 12 + bob);
  /* Forearm — skin */
  ctx.fillStyle = PAL.skin;
  ctx.fillRect(armX, -30, 4, 7);
  /* Hand */
  ctx.fillStyle = PAL.skinDk;
  ctx.beginPath();
  ctx.arc(armX + 2, -22, 2.2, 0, Math.PI * 2);
  ctx.fill();

  /* === Head === */
  /* Hair behind */
  ctx.fillStyle = PAL.hair;
  ctx.beginPath();
  ctx.ellipse(-1, -57, 8, 9, 0, 0, Math.PI * 2);
  ctx.fill();
  /* Hair down the back */
  ctx.fillRect(-7, -57, 4, 13);

  /* Face — side profile */
  ctx.fillStyle = PAL.skin;
  ctx.beginPath();
  ctx.ellipse(2, -56, 5.5, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  /* Cheek shadow */
  ctx.fillStyle = PAL.skinDk;
  ctx.beginPath();
  ctx.ellipse(0, -54, 3, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  /* Eye — blue */
  ctx.fillStyle = '#1a3a60';
  ctx.fillRect(4, -58, 1.6, 1.8);
  /* Tiny eye highlight */
  ctx.fillStyle = '#a8c8e8';
  ctx.fillRect(5, -58, 0.5, 0.5);

  /* Eyelash hint */
  ctx.fillStyle = PAL.hair;
  ctx.fillRect(4, -59, 1.8, 0.5);

  /* Mouth */
  ctx.fillStyle = '#7a3030';
  ctx.fillRect(4, -53, 2, 0.8);

  /* Hair on top — covers head crown */
  ctx.fillStyle = PAL.hair;
  ctx.beginPath();
  ctx.arc(0, -62, 7, 0, Math.PI * 2);
  ctx.fill();
  /* Bangs falling slightly forward */
  ctx.fillStyle = PAL.hair;
  ctx.beginPath();
  ctx.moveTo(2, -61);
  ctx.lineTo(7, -58);
  ctx.lineTo(6, -54);
  ctx.lineTo(4, -54);
  ctx.closePath();
  ctx.fill();
  /* Hair highlight */
  ctx.fillStyle = PAL.hairHi;
  ctx.fillRect(-3, -65, 4, 1.5);

  ctx.restore();
}

function drawAtmosphere() {
  for (const m of motes) {
    const a = 0.16 + Math.sin(m.phase) * 0.1;
    ctx.fillStyle = `rgba(220, 215, 210, ${a})`;
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.size, 0, Math.PI * 2);
    ctx.fill();
  }
  for (const f of fog) {
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.width / 2);
    g.addColorStop(0, `rgba(200, 195, 188, ${f.alpha})`);
    g.addColorStop(1, 'rgba(200, 195, 188, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(f.x - f.width/2, f.y - 30, f.width, 60);
  }
}

function drawScarePulse() {
  if (jimActive) {
    ctx.fillStyle = 'rgba(168, 32, 59, 0.08)';
    ctx.fillRect(0, 0, W, H);
  }
}

function drawPlacementGhost() {
  if (mode !== 'build' || !selected) return;
  const px = Input.pointer.x, py = Input.pointer.y;
  if (px < SHOP.x || px > SHOP.x + SHOP.w || py < SHOP.y || py > SHOP.y + SHOP.h) return;
  const it = ITEMS[selected];
  ctx.globalAlpha = coins >= it.cost ? 0.55 : 0.25;
  ctx.fillStyle = it.color;
  const cx = Math.max(SHOP.x + it.w/2, Math.min(SHOP.x + SHOP.w - it.w/2, px));
  const cy = Math.max(SHOP.y + it.h/2, Math.min(SHOP.y + SHOP.h - it.h/2, py));
  ctx.fillRect(cx - it.w/2, cy - it.h/2, it.w, it.h);
  ctx.strokeStyle = coins >= it.cost ? PAL.cream : PAL.bobaRed;
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - it.w/2, cy - it.h/2, it.w, it.h);
  ctx.globalAlpha = 1;
}

function drawTutorialHint() {
  if (mode !== 'build' || placed.length > 0) return;
  ctx.save();
  ctx.fillStyle = `rgba(245, 225, 230, ${0.32 + Math.sin(t * 2) * 0.1})`;
  ctx.font = "italic 13px 'Cormorant Garamond', Georgia, serif";
  ctx.textAlign = 'center';
  if (!selected) {
    ctx.fillText('pick something below to build →', SHOP.x + SHOP.w/2, SHOP.y + SHOP.h/2);
  } else {
    ctx.fillText('click in here to place it', SHOP.x + SHOP.w/2, SHOP.y + SHOP.h/2);
  }
  ctx.restore();
}

function drawVignette() {
  const g = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, Math.max(W, H) * 0.7);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.62)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawLetterbox() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, 30);
  ctx.fillRect(0, H - 30, W, 30);
}

/* === HUD === */

function drawProfileButton() {
  const x = 12, y = 12, s = 48;
  /* Background */
  ctx.fillStyle = 'rgba(20, 18, 22, 0.78)';
  ctx.fillRect(x, y, s, s);
  ctx.strokeStyle = PAL.sageDeep;
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, s, s);
  /* Mini portrait icon */
  ctx.save();
  ctx.translate(x + s/2, y + s/2 + 6);
  /* Hair behind */
  ctx.fillStyle = PAL.hair;
  ctx.beginPath();
  ctx.arc(0, -6, 11, 0, Math.PI * 2);
  ctx.fill();
  /* Face */
  ctx.fillStyle = PAL.skin;
  ctx.beginPath();
  ctx.ellipse(0, -5, 7, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  /* Eyes */
  ctx.fillStyle = '#1a3a60';
  ctx.fillRect(-3, -6, 1.5, 1.5);
  ctx.fillRect(2, -6, 1.5, 1.5);
  /* Mouth */
  ctx.fillStyle = '#7a3030';
  ctx.fillRect(-1, -2, 2, 0.6);
  /* Apron strap visible at neck */
  ctx.fillStyle = PAL.apron;
  ctx.fillRect(-3, 4, 6, 6);
  ctx.restore();
}

function drawModeToggle() {
  const x = W/2 - 60, y = 12, w = 120, h = 32;
  const isBuild = (mode === 'build');
  /* Background */
  ctx.fillStyle = 'rgba(20, 18, 22, 0.78)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = isBuild ? PAL.apron : PAL.matcha;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);
  /* Label — what you'd switch TO */
  ctx.fillStyle = isBuild ? PAL.apronHi : PAL.matcha;
  ctx.font = "bold 11px system-ui";
  ctx.letterSpacing = '2px';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(isBuild ? '▶  OPEN SHOP' : '🔨 BUILD', W/2, y + h/2);
  /* Mode chip — the one you're currently in */
  ctx.font = "9px system-ui";
  ctx.fillStyle = '#9a9286';
  ctx.fillText('— ' + (isBuild ? 'building' : 'open') + ' —', W/2, y + h + 12);
}

function drawHUD() {
  /* Coin counter top right */
  const cx = W - 100, cy = 30;
  ctx.fillStyle = 'rgba(20, 18, 22, 0.78)';
  ctx.fillRect(cx - 12, cy - 18, 100, 32);
  ctx.strokeStyle = PAL.sageDeep;
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - 12, cy - 18, 100, 32);

  ctx.fillStyle = PAL.warm;
  ctx.beginPath();
  ctx.arc(cx + 5, cy - 2, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#b58030';
  ctx.beginPath();
  ctx.arc(cx + 5, cy - 2, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = PAL.warm;
  ctx.font = 'bold 10px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('¢', cx + 5, cy - 2);

  const flashCol = coinFlash > 0 ? `rgba(255, 230, ${Math.floor(120 + coinFlash*100)}, 1)` : PAL.cream;
  ctx.fillStyle = flashCol;
  ctx.font = 'bold 20px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(coins, cx + 22, cy - 2);

  /* Player name HUD — only when set, only in play mode */
  if (playerName && mode === 'play') {
    ctx.fillStyle = 'rgba(20, 18, 22, 0.78)';
    ctx.fillRect(70, 12, 200, 28);
    ctx.strokeStyle = PAL.sageDeep;
    ctx.strokeRect(70, 12, 200, 28);
    ctx.fillStyle = PAL.apronHi;
    ctx.font = "italic 16px 'Cormorant Garamond', Georgia, serif";
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(playerName, 84, 26);
  }
}

function drawBuildPalette() {
  if (mode !== 'build') return;
  /* Background bar */
  ctx.fillStyle = 'rgba(20, 18, 22, 0.92)';
  ctx.fillRect(0, H - 76, W, 76 - 30);  /* above bottom letterbox */

  ctx.fillStyle = PAL.sageHi;
  ctx.font = "bold 11px system-ui";
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText("BUILD", 14, H - 60);

  const items = Object.keys(ITEMS);
  const slotW = 130;
  const startX = W/2 - (items.length * slotW) / 2;

  items.forEach((key, i) => {
    const it = ITEMS[key];
    const x = startX + i * slotW, y = H - 56, w = slotW - 10, h = 44;
    const isSel = selected === key;
    const canBuy = coins >= it.cost;

    ctx.fillStyle = isSel ? 'rgba(244, 184, 197, 0.16)' : 'rgba(255,255,255,0.04)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = isSel ? PAL.apronHi : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isSel ? 2 : 1;
    ctx.strokeRect(x, y, w, h);

    /* Icon */
    if (key === 'machine') {
      ctx.fillStyle = canBuy ? '#7a9670' : '#555';
      ctx.fillRect(x + 12, y + 9, 14, 26);
      ctx.fillStyle = canBuy ? PAL.cream : '#444';
      ctx.fillRect(x + 14, y + 13, 10, 8);
    } else if (key === 'table') {
      ctx.fillStyle = canBuy ? '#9ab8c8' : '#555';
      ctx.beginPath();
      ctx.ellipse(x + 19, y + 24, 11, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = canBuy ? '#7fa0b0' : '#444';
      ctx.fillRect(x + 17, y + 24, 4, 8);
    } else {
      ctx.fillStyle = canBuy ? '#7a5435' : '#555';
      ctx.fillRect(x + 8, y + 18, 22, 10);
    }
    /* Name + cost */
    ctx.fillStyle = canBuy ? PAL.cream : '#888';
    ctx.font = "bold 12px system-ui";
    ctx.textAlign = 'left';
    ctx.fillText(it.name, x + 38, y + 18);
    ctx.fillStyle = canBuy ? PAL.warm : '#666';
    ctx.font = "11px system-ui";
    ctx.fillText('¢ ' + it.cost, x + 38, y + 32);
  });

  ctx.fillStyle = PAL.apronHi;
  ctx.font = "italic 11px 'Cormorant Garamond', Georgia, serif";
  ctx.textAlign = 'right';
  if (selected) {
    ctx.fillText('selected: ' + ITEMS[selected].name + '  —  click in the shop', W - 14, H - 38);
  } else {
    ctx.fillText('build your shop, then open it', W - 14, H - 38);
  }
}

function drawTapOverlay() {
  if (!needsTap) return;
  ctx.fillStyle = 'rgba(8, 6, 12, 0.82)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = PAL.apronHi;
  ctx.font = "italic bold 44px 'Cormorant Garamond', Georgia, serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText("Jim's Boba Shop", W/2, H/2 - 30);

  ctx.fillStyle = PAL.cream;
  ctx.font = "italic 16px 'Cormorant Garamond', Georgia, serif";
  ctx.fillText('a kawaii horror shop sim', W/2, H/2 + 4);

  const a = 0.7 + Math.sin(t * 3) * 0.3;
  ctx.fillStyle = `rgba(245, 225, 230, ${a})`;
  ctx.font = "14px system-ui";
  ctx.fillText('— tap to begin —', W/2, H/2 + 50);
}

/* === Front-facing portrait, drawn in profile panel === */
function drawPortrait() {
  const px = portraitCtx;
  const PW = 200, PH = 200;
  /* Background */
  const bg = px.createLinearGradient(0, 0, 0, PH);
  bg.addColorStop(0, '#3a342e');
  bg.addColorStop(1, '#1f1c18');
  px.fillStyle = bg;
  px.fillRect(0, 0, PW, PH);

  /* Vignette */
  const v = px.createRadialGradient(PW/2, PH/2, 50, PW/2, PH/2, PW * 0.7);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,0.55)');
  px.fillStyle = v;
  px.fillRect(0, 0, PW, PH);

  px.save();
  px.translate(PW/2, PH * 0.62);  /* center, slightly low */

  /* Shoulders / tee */
  px.fillStyle = PAL.tee;
  px.beginPath();
  px.ellipse(0, 80, 80, 30, 0, 0, Math.PI * 2);
  px.fill();
  px.fillStyle = PAL.teeDk;
  px.fillRect(-46, 60, 92, 4);  /* shoulder shadow */

  /* Apron straps + bib (front view) */
  px.fillStyle = PAL.apron;
  px.fillRect(-22, 30, 44, 80);  /* bib */
  /* Apron straps going up to neck */
  px.fillRect(-22, -10, 6, 50);
  px.fillRect(16, -10, 6, 50);
  /* Apron top hem */
  px.fillStyle = PAL.apronHi;
  px.fillRect(-22, 30, 44, 3);
  /* Apron shadow on left side */
  px.fillStyle = PAL.apronDk;
  px.fillRect(-22, 30, 4, 80);
  /* Apron pocket */
  px.fillStyle = PAL.apronDk;
  px.fillRect(-12, 60, 24, 14);
  px.fillStyle = PAL.apronHi;
  px.fillRect(-12, 60, 24, 1.5);

  /* Neck */
  px.fillStyle = PAL.skin;
  px.fillRect(-7, -20, 14, 22);
  px.fillStyle = PAL.skinDk;
  px.fillRect(4, -20, 3, 22);  /* shadow */

  /* Head — front-facing oval */
  px.fillStyle = PAL.skin;
  px.beginPath();
  px.ellipse(0, -45, 28, 34, 0, 0, Math.PI * 2);
  px.fill();
  /* Side shading */
  px.fillStyle = PAL.skinDk;
  px.beginPath();
  px.ellipse(15, -45, 13, 30, 0, 0, Math.PI * 2);
  px.fill();
  /* Cheek blush */
  px.fillStyle = 'rgba(244, 184, 197, 0.45)';
  px.beginPath();
  px.ellipse(-12, -36, 6, 4, 0, 0, Math.PI * 2);
  px.ellipse(12, -36, 6, 4, 0, 0, Math.PI * 2);
  px.fill();

  /* Eyes — blue */
  /* Whites */
  px.fillStyle = '#f4ede0';
  px.fillRect(-13, -52, 10, 5);
  px.fillRect(3, -52, 10, 5);
  /* Iris */
  px.fillStyle = '#3a6a98';
  px.beginPath();
  px.arc(-8, -49, 3.5, 0, Math.PI * 2);
  px.arc(8, -49, 3.5, 0, Math.PI * 2);
  px.fill();
  /* Pupil */
  px.fillStyle = '#0a141f';
  px.beginPath();
  px.arc(-8, -49, 1.6, 0, Math.PI * 2);
  px.arc(8, -49, 1.6, 0, Math.PI * 2);
  px.fill();
  /* Eye highlights */
  px.fillStyle = '#fff';
  px.fillRect(-9, -51, 1.2, 1.2);
  px.fillRect(7, -51, 1.2, 1.2);
  /* Eyebrows */
  px.fillStyle = PAL.hair;
  px.fillRect(-13, -58, 10, 2);
  px.fillRect(3, -58, 10, 2);
  /* Eyelashes */
  px.fillStyle = PAL.hair;
  px.fillRect(-13, -53, 10, 1);
  px.fillRect(3, -53, 10, 1);

  /* Nose */
  px.fillStyle = PAL.skinDk;
  px.beginPath();
  px.moveTo(-2, -40);
  px.lineTo(0, -32);
  px.lineTo(2, -40);
  px.fill();
  px.fillRect(-1.5, -34, 3, 1);

  /* Mouth */
  px.fillStyle = '#a04848';
  px.fillRect(-5, -25, 10, 2);
  px.strokeStyle = '#7a3030';
  px.lineWidth = 0.8;
  px.beginPath();
  px.moveTo(-5, -24);
  px.quadraticCurveTo(0, -22, 5, -24);
  px.stroke();

  /* Hair — covers crown, falls down sides, longer in back */
  px.fillStyle = PAL.hair;
  /* Hair behind shoulders */
  px.fillRect(-32, -30, 64, 70);
  /* Hair on top of head */
  px.beginPath();
  px.ellipse(0, -68, 30, 20, 0, 0, Math.PI * 2);
  px.fill();
  /* Hair down sides framing face */
  px.fillRect(-30, -55, 6, 50);
  px.fillRect(24, -55, 6, 50);
  /* Bangs sweeping across forehead */
  px.beginPath();
  px.moveTo(-22, -65);
  px.quadraticCurveTo(-5, -55, 18, -65);
  px.lineTo(20, -52);
  px.quadraticCurveTo(0, -45, -20, -52);
  px.closePath();
  px.fill();
  /* Hair highlights */
  px.fillStyle = PAL.hairHi;
  px.fillRect(-6, -78, 12, 3);
  px.fillRect(-22, -68, 6, 2);

  px.restore();

  /* Caption: shop logo bottom right */
  px.fillStyle = 'rgba(168, 198, 159, 0.5)';
  px.font = "italic 9px 'Cormorant Garamond', Georgia, serif";
  px.textAlign = 'right';
  px.fillText("jim's boba shop", PW - 8, PH - 8);
}

/* ============ Render ============ */
function render() {
  ctx.save();
  const sh = Juice.getShake();
  ctx.translate(sh.x, sh.y);

  drawSky();
  drawDistantBuildings();
  drawShopFacade();
  drawShopWindow();
  drawHangingSign();
  drawShopDoor();
  drawUpstairsWindow();
  drawPlacedItems();
  drawSidewalk();
  drawLampGlow();
  drawLamp();
  drawPlayer();
  drawAtmosphere();
  Juice.drawParticles(ctx, particles);
  drawScarePulse();
  drawPlacementGhost();
  drawTutorialHint();
  drawVignette();
  drawLetterbox();
  drawProfileButton();
  drawModeToggle();
  drawHUD();
  drawBuildPalette();
  drawTapOverlay();

  ctx.restore();
}

/* ============ Loop ============ */
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (!Juice.isFrozen()) update(dt);
  Juice.tickFreeze();
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
