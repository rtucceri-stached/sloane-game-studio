<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=VT323&display=swap"

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #050208;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        font-family: 'Cormorant Garamond', serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #game {
        display: block;
        background: #050208;
        box-shadow:
          0 0 80px rgba(168, 85, 255, 0.25),
          0 0 200px rgba(155, 255, 94, 0.08);
        image-rendering: auto;
      }

      /* ---- Touch controls ---- */
      #touch-controls {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: none;
        z-index: 10;
      }
      #touch-controls.on {
        display: block;
      }
      .pad-base {
        position: absolute;
        pointer-events: auto;
        user-select: none;
        -webkit-user-select: none;

        justify-content: center;

      }
      #dpad .up {
        left: 56px;
        top: 0;
      }
      #dpad .down {
        left: 56px;
        top: 112px;
      }
      #dpad .left {
        left: 0;
        top: 56px;
      }
      #dpad .right {
        left: 112px;
        top: 56px;

      #action-btn {
        right: 28px;
        bottom: 50px;

        height: 96px;

    <canvas id="game"></canvas>
    <div id="touch-controls">
      <div id="dpad" class="pad-base">
        <div class="dpad-btn up" data-key="up">▲</div>
        <div class="dpad-btn down" data-key="down">▼</div>
        <div class="dpad-btn left" data-key="left">◀</div>
        <div class="dpad-btn right" data-key="right">▶</div>
      </div>
      <div id="action-btn" class="pad-base" data-key="action">Swap</div>

    <script>
      /* ============================================================
   SHARED LIBRARIES (inlined — Dad swaps these for <script src>
   tags pointing at shared/ when saving into the project)
   ============================================================ */

      /* ---------- Input Manager: keyboard + touch -------------- */
      const Input = (function () {
        const keys = {};
        const justPressed = {};
        const map = {
          arrowleft: 'left',
          a: 'left',
          arrowright: 'right',
          d: 'right',
          arrowup: 'up',
          w: 'up',
          arrowdown: 'down',
          s: 'down',
          ' ': 'action',
          enter: 'action',
          e: 'action',
          shift: 'action',
        };

        window.addEventListener('keydown', (e) => {
          const k = e.key.toLowerCase();
          const action = map[k];
          if (action) {
            if (!keys[action]) justPressed[action] = true;
            keys[action] = true;
            e.preventDefault();
          }
        });
        window.addEventListener('keyup', (e) => {
          const k = e.key.toLowerCase();
          const action = map[k];
          if (action) keys[action] = false;
        });

        function setupTouchButton(el, name) {
          const press = (ev) => {
            ev.preventDefault();
            if (!keys[name]) justPressed[name] = true;
            keys[name] = true;
            el.classList.add('active');
          };
          const release = (ev) => {
            ev.preventDefault();
            keys[name] = false;
            el.classList.remove('active');
          };
          el.addEventListener('touchstart', press, { passive: false });
          el.addEventListener('touchend', release, { passive: false });
          el.addEventListener('touchcancel', release, { passive: false });
          el.addEventListener('mousedown', press);
          el.addEventListener('mouseup', release);
          el.addEventListener('mouseleave', release);
        }

        let touchEnabled = false;
        function enableTouchControls() {
          if (touchEnabled) return;
          const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
          if (!isTouch) return;
          touchEnabled = true;
          const tc = document.getElementById('touch-controls');
          if (!tc) return;
          tc.classList.add('on');
          tc.querySelectorAll('[data-key]').forEach((el) => {
            setupTouchButton(el, el.dataset.key);
          });
        }

        return {
          isDown(name) {
            return !!keys[name];
          },
          wasPressed(name) {
            return !!justPressed[name];
          },
          enableTouchControls,
          endFrame() {
            for (const k in justPressed) justPressed[k] = false;
          },
        };
      })();

      /* ---------- Juice: easing, particles, shake, freeze -------- */
      const Juice = (function () {
        let shakeAmount = 0;
        let freezeFrames = 0;

        return {
          lerp(a, b, t) {
            return a + (b - a) * t;
          },
          burst(x, y, count, color) {
            const out = [];
            for (let i = 0; i < count; i++) {
              const a = Math.random() * Math.PI * 2;
              const s = 1 + Math.random() * 4;
              out.push({
                x,
                y,
                vx: Math.cos(a) * s,
                vy: Math.sin(a) * s,
                life: 30 + Math.random() * 25,
                maxLife: 55,
                color,
                size: 2 + Math.random() * 3,
              });
            }
            return out;
          },
          sparkle(x, y, count, color) {
            const out = [];
            for (let i = 0; i < count; i++) {
              const a = Math.random() * Math.PI * 2;
              const s = 0.5 + Math.random() * 1.5;
              out.push({
                x: x + (Math.random() - 0.5) * 10,
                y: y + (Math.random() - 0.5) * 10,
                vx: Math.cos(a) * s,
                vy: Math.sin(a) * s - 0.4,
                life: 40 + Math.random() * 30,
                maxLife: 70,
                color,
                size: 1 + Math.random() * 2,
                twinkle: true,
              });
            }
            return out;
          },
          shake(amount) {
            shakeAmount = Math.max(shakeAmount, amount);
          },
          getShakeOffset() {
            const s = shakeAmount;
            shakeAmount *= 0.85;
            if (shakeAmount < 0.1) shakeAmount = 0;
            return {
              x: (Math.random() - 0.5) * s,
              y: (Math.random() - 0.5) * s,
            };
          },
          freeze(frames) {
            freezeFrames = Math.max(freezeFrames, frames);
          },
          isFrozen() {
            if (freezeFrames > 0) {
              freezeFrames--;
              return true;
            }
            return false;
          },
        };
      })();

      /* ---------- Sound: procedural Web Audio beeps -------------- */
      const Sound = (function () {
        let ac = null;
        let muted = false;

        function ensure() {
          if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
          if (ac.state === 'suspended') ac.resume();
          return ac;
        }

        function tone({
          freq,
          dur = 0.15,
          type = 'square',
          volume = 0.1,
          slideTo = null,
          attack = 0.005,
        }) {
          if (muted) return;
          const a = ensure();
          const t = a.currentTime;
          const osc = a.createOscillator();
          const gain = a.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t);
          if (slideTo !== null) osc.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(volume, t + attack);
          gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
          osc.connect(gain).connect(a.destination);
          osc.start(t);
          osc.stop(t + dur + 0.02);
        }

        function noiseBurst({ dur = 0.2, volume = 0.08, filter = 800 }) {
          if (muted) return;
          const a = ensure();
          const t = a.currentTime;
          const buf = a.createBuffer(1, a.sampleRate * dur, a.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
          const src = a.createBufferSource();
          src.buffer = buf;
          const f = a.createBiquadFilter();
          f.type = 'lowpass';
          f.frequency.value = filter;
          const gain = a.createGain();
          gain.gain.setValueAtTime(volume, t);
          gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
          src.connect(f).connect(gain).connect(a.destination);
          src.start(t);
          src.stop(t + dur);
        }

        const sounds = {
          step: () => noiseBurst({ dur: 0.04, volume: 0.025, filter: 380 }),
          swap: () => {
            tone({ freq: 600, dur: 0.06, type: 'triangle', volume: 0.08 });
            setTimeout(() => tone({ freq: 900, dur: 0.08, type: 'triangle', volume: 0.08 }), 50);
          },
          sparkle: () => {
            tone({ freq: 1500, dur: 0.05, type: 'triangle', volume: 0.07 });
            setTimeout(() => tone({ freq: 1900, dur: 0.06, type: 'triangle', volume: 0.06 }), 40);
            setTimeout(() => tone({ freq: 2400, dur: 0.07, type: 'triangle', volume: 0.05 }), 80);
          },
          coin: () => {
            tone({ freq: 880, dur: 0.07, type: 'square', volume: 0.09 });
            setTimeout(() => tone({ freq: 1320, dur: 0.12, type: 'square', volume: 0.09 }), 60);
          },
          clue: () => {
            tone({ freq: 660, dur: 0.08, type: 'triangle', volume: 0.1 });
            setTimeout(() => tone({ freq: 990, dur: 0.1, type: 'triangle', volume: 0.1 }), 60);
            setTimeout(() => tone({ freq: 1320, dur: 0.18, type: 'triangle', volume: 0.1 }), 130);
          },
          mystery: () => tone({ freq: 220, dur: 0.4, type: 'sine', volume: 0.06, slideTo: 165 }),
          pondReveal: () => {
            tone({ freq: 330, dur: 0.6, type: 'sine', volume: 0.1, slideTo: 660, attack: 0.05 });
            setTimeout(
              () => tone({ freq: 440, dur: 0.5, type: 'triangle', volume: 0.08, slideTo: 880 }),
              250
            );
          },
          win: () => {
            const notes = [523, 659, 784, 1047, 784, 1047, 1319];
            notes.forEach((f, i) =>
              setTimeout(() => tone({ freq: f, dur: 0.18, type: 'square', volume: 0.1 }), i * 150)
            );
          },
          click: () => tone({ freq: 500, dur: 0.04, type: 'square', volume: 0.07 }),
          dialogBlip: () =>
            tone({ freq: 380 + Math.random() * 80, dur: 0.025, type: 'square', volume: 0.04 }),
        };

        return {
          play(name) {
            if (sounds[name]) sounds[name]();
          },
          set mute(v) {
            muted = !!v;
          },
          get mute() {
            return muted;
          },
        };
      })();

      /* ---------- Canvas: responsive sizing ---------------------- */
      const Canvas = (function () {
        return {
          fit(canvas, W, H) {
            function resize() {
              const dpr = Math.min(window.devicePixelRatio || 1, 2);
              const ratio = W / H;
              const winRatio = window.innerWidth / window.innerHeight;
              let cssW, cssH;
              if (winRatio > ratio) {
                cssH = window.innerHeight;
                cssW = cssH * ratio;
              } else {
                cssW = window.innerWidth;
                cssH = cssW / ratio;
              }
              canvas.style.width = cssW + 'px';
              canvas.style.height = cssH + 'px';
              canvas.width = W * dpr;
              canvas.height = H * dpr;
              const ctx = canvas.getContext('2d');
              ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
              ctx.imageSmoothingEnabled = true;
            }
            resize();
            window.addEventListener('resize', resize);
          },
        };
      })();

      /* ============================================================
   GAME: Bigfoot & Ghost — Episode 1: The Dark Forest
   ============================================================ */

      /* ---------- Palette (Sloane's three colors are the anchor) -- */
      const PAL = {
        // Backgrounds (deep purple night)
        skyTop: '#0a0518',
        skyMid: '#160a2e',
        skyBottom: '#291647',
        groundTop: '#1a0e2e',
        groundMid: '#150a24',
        groundBot: '#080414',

        // Sloane's three loud colors
        pinkGlit: '#ff4dc8', // glittery — Bigfoot's bow, sparkles, hearts
        purpleSplat: '#a855ff', // splatter-paint — ghost glow, UI accents
        limeGlow: '#9bff5e', // glow-in-the-dark — mushrooms, magic light

        // Forest layers (parallax depth via value, not just color)
        treeBack: '#120822',
        treeMid: '#1c0e30',
        treeFront: '#27143e',
        leavesBack: '#0e1f18',
        leavesMid: '#16302a',
        leavesFront: '#1f3f38',

        // Ambient lighting
        fireflyGlow: '#ffd76b',
        ghostGlow: '#c9a8ff',
        pondGlow: '#5ee8ff',
        pondShimmer: '#a8f0ff',

        // Bigfoot
        bigfootFur: '#3a2a1f',
        bigfootDark: '#221610',
        bigfootHigh: '#544037',
        bigfootEye: '#ffffff',
        bigfootPup: '#0a0a0a',
        bigfootBow: '#ff4dc8',
        bigfootBowD: '#c2369a',

        // Ghost
        ghostBody: '#ece0ff',
        ghostBodyD: '#b8a8d8',
        ghostEye: '#1a0a2e',

        // Bushes (witchy, faintly glowing)
        bushFront: '#1f3f38',
        bushBack: '#152d28',
        bushTip: '#9bff5e',
        bushBerry: '#ff4dc8',

        // Logs
        logBody: '#3a2820',
        logRing: '#5a3e30',
        logShade: '#1a0e08',
        logMoss: '#3a5840',

        // Atmosphere
        fogColor: 'rgba(180, 160, 220, 0.10)',
        vignette: 'rgba(0, 0, 0, 0.78)',

        // UI
        uiBg: 'rgba(15, 8, 28, 0.92)',
        uiBgSolid: '#0f081c',
        uiBorder: '#a855ff',
        uiBorderHi: '#ff4dc8',
        uiText: '#f5e8ff',
        uiAccent: '#9bff5e',
        uiPink: '#ff4dc8',
        uiDim: '#7a6a8a',
      };

      /* ---------- Canvas setup --------------------------------- */
      const W = 960,
        H = 600;
      const canvas = document.getElementById('game');
      Canvas.fit(canvas, W, H);
      const ctx = canvas.getContext('2d');

      /* ---------- World dimensions (camera scrolls inside) ----- */
      const WORLD_W = 2400;
      const WORLD_H = 1700;

      const camera = { x: 0, y: 0, tx: 0, ty: 0 };

      /* ---------- Characters ----------------------------------- */
      const bigfoot = {
        x: 1200,
        y: 1100,
        vx: 0,
        vy: 0,
        r: 22, // collision radius
        facing: 1, // 1 right, -1 left
        walkPhase: 0, // for legs
        bobPhase: 0, // tiny idle bob
        type: 'bigfoot',
        speed: 2.6,
      };

      const ghost = {
        x: 1230,
        y: 1095,
        vx: 0,
        vy: 0,
        r: 18,
        facing: 1,
        bobPhase: Math.random() * Math.PI * 2,
        drift: 0,
        type: 'ghost',
        speed: 2.7,
      };

      let leader = bigfoot;
      let follower = ghost;

      /* ---------- Static world layout -------------------------- */
      // We place trees, bushes, logs, mushrooms, rocks, clues with
      // careful coordinates. Scattering procedurally would feel random;
      // hand-placing with intent makes a real PLACE.

      const trees = []; // background silhouettes (decorative + parallax)
      const treesFront = []; // foreground trees (block player visually but not movement — they're just atmosphere unless we want collision)
      const bushes = []; // BLOCK GHOST. Bigfoot pushes through.
      const logs = []; // BLOCK BIGFOOT. Ghost phases through.
      const mushrooms = []; // light sources
      const rocks = []; // pure decoration
      const grassTufts = []; // pure decoration

      (function buildWorld() {
        // ---- Trees (background, far) ----
        const rngTree = mulberry32(11);
        for (let i = 0; i < 90; i++) {
          trees.push({
            x: rngTree() * WORLD_W,
            y: 80 + rngTree() * (WORLD_H - 160),
            h: 90 + rngTree() * 130,
            w: 28 + rngTree() * 38,
            depth: 0.5 + rngTree() * 0.5, // parallax / shading
            sway: rngTree() * Math.PI * 2,
          });
        }
        for (let i = 0; i < 50; i++) {
          treesFront.push({
            x: rngTree() * WORLD_W,
            y: 80 + rngTree() * (WORLD_H - 160),
            h: 130 + rngTree() * 160,
            w: 36 + rngTree() * 44,
            sway: rngTree() * Math.PI * 2,
          });
        }

        // ---- Mushrooms scattered, with extra clusters at clue spots
        function placeMushroomCluster(cx, cy, n, spread) {
          for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2;
            const d = Math.random() * spread;
            mushrooms.push({
              x: cx + Math.cos(a) * d,
              y: cy + Math.sin(a) * d,
              h: 18 + Math.random() * 22,
              cap: 14 + Math.random() * 10,
              glow: 60 + Math.random() * 40,
              pulse: Math.random() * Math.PI * 2,
              pulseSpeed: 0.025 + Math.random() * 0.015,
            });
          }
        }

        // Light the path north and along main routes
        for (let i = 0; i < 24; i++) {
          placeMushroomCluster(
            300 + Math.random() * (WORLD_W - 600),
            200 + Math.random() * (WORLD_H - 400),
            1 + Math.floor(Math.random() * 3),
            40
          );
        }

        // ---- Rocks ----
        for (let i = 0; i < 30; i++) {
          rocks.push({
            x: Math.random() * WORLD_W,
            y: 200 + Math.random() * (WORLD_H - 400),
            w: 30 + Math.random() * 50,
            h: 18 + Math.random() * 26,
          });
        }

        // ---- Grass tufts ----
        for (let i = 0; i < 200; i++) {
          grassTufts.push({
            x: Math.random() * WORLD_W,
            y: 140 + Math.random() * (WORLD_H - 200),
            h: 6 + Math.random() * 10,
            sway: Math.random() * Math.PI * 2,
          });
        }

        // ---- Bushes (Ghost-blocking) — south & east areas ----
        // Cluster of bushes guarding the SHELL clue (south)
        pushBushRow(1500, 1380, 6, 70, 0);
        pushBushRow(1500, 1440, 6, 70, 25);
        // Bushes guarding the FLANNEL clue (south-west)
        pushBushRow(550, 1320, 5, 70, 0);
        pushBushRow(580, 1380, 4, 70, 30);
        // Some scattered atmospheric bushes
        for (let i = 0; i < 14; i++) {
          bushes.push(makeBush(Math.random() * WORLD_W, 200 + Math.random() * (WORLD_H - 400)));
        }

        function pushBushRow(x, y, n, gap, jitter) {
          for (let i = 0; i < n; i++) {
            bushes.push(
              makeBush(
                x + i * gap + (Math.random() - 0.5) * jitter,
                y + (Math.random() - 0.5) * jitter
              )
            );
          }
        }
        function makeBush(x, y) {
          return {
            x,
            y,
            r: 30 + Math.random() * 14,
            sway: Math.random() * Math.PI * 2,
            berries: Math.random() < 0.5,
          };
        }

        // ---- Logs (Bigfoot-blocking) — north area ----
        // Wall of logs guarding the SCRUNCHIE clue
        logs.push({ x: 700, y: 540, w: 280, h: 38, rot: 0.05 });
        logs.push({ x: 1000, y: 580, w: 220, h: 38, rot: -0.04 });
        // Wall of logs guarding the POLAROID clue
        logs.push({ x: 1500, y: 520, w: 260, h: 38, rot: -0.02 });
        logs.push({ x: 1780, y: 560, w: 200, h: 38, rot: 0.03 });
        // A few atmospheric logs scattered
        logs.push({ x: 380, y: 880, w: 180, h: 32, rot: 0.1 });
        logs.push({ x: 2050, y: 940, w: 170, h: 32, rot: -0.08 });
      })();

      /* Tiny seedable RNG */
      function mulberry32(seed) {
        return function () {
          seed |= 0;
          seed = (seed + 0x6d2b79f5) | 0;
          let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      /* ---------- Clues -----------------------------------------
   Each clue knows where it lives and what it says.
   A clue can require Bigfoot, Ghost, or either to reach (just by
   physical access — no explicit lock; bushes/logs do that work).
*/
      const clues = [
        {
          id: 'note',
          x: 1280,
          y: 920,
          title: 'A Glowing Note',
          icon: 'note',
          flavor:
            '"Saw something with fins last Tuesday. Or maybe just a wet raccoon. ANYWAY." — anonymous forest gossip',

        },
        {

          icon: 'sign',
          flavor: 'It reads: "NO MERMAIDS THIS WAY ↗" (The arrow points northeast.)',

        },
        {

          x: 700,
          y: 1420, // behind south-west bushes — needs Bigfoot

          flavor:

        },
        {
          id: 'shell',
          x: 1740,
          y: 1430, // behind south-east bushes — needs Bigfoot
          title: 'A Suspicious Seashell',
          icon: 'shell',
          flavor: 'We are two hundred miles from any ocean. Explain yourself, shell.',
          ghostQuip: 'The shell is not explaining itself. That tracks.',
          collected: false,
        },
        {
          id: 'scrunchie',
          x: 850,
          y: 460, // behind north-west logs — needs Ghost
          title: 'A Pink Scrunchie',

      /* ============================================================
